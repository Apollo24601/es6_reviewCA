<!DOCTYPE html>
<html>
<head>
  <title>Cat Form</title>
</head>
<body>

  <h1>Submit Cat Info</h1>

  <form id="catForm">
  <div class="row">
    <div class="col-xs-6">
      <label><input type="radio" name="type" value="Indoor"> Indoor</label>
    </div>
    <div class="col-xs-6">
      <label><input type="radio" name="type" value="Outdoor"> Outdoor</label>
    </div>
  </div>

  <div class="row">
    <div class="col-xs-4">
      <label><input type="checkbox" name="personality" value="Loving"> Loving</label>
    </div>
    <div class="col-xs-4">
      <label><input type="checkbox" name="personality" value="Lazy"> Lazy</label>
    </div>
    <div class="col-xs-4">
      <label><input type="checkbox" name="personality" value="Crazy"> Crazy</label>
    </div>
  </div>

  <div class="row">
    <div class="col-xs-7">
      <input type="text" name="name" class="form-control" placeholder="Cat name" id="name" required>
    </div>
    <div class="col-xs-5">
      <input type="number" name="age" class="form-control" placeholder="Age" id="age" required>
    </div>
  </div>

  <br>

  <button type="submit" class="btn btn-primary btn-block">
    Submit
  </button>
</form>

<div id="responseMsg"></div>

  <h3>Response:</h3>
  <pre id="response"></pre>

  <h3>Delete User</h3>

<input type="text" id="deleteId" placeholder="Enter User ID">
<button onclick="deleteUser()">Delete</button>

<h3>Update User</h3>

<input type="text" id="updateId" placeholder="Enter User ID"><br><br>

<input type="text" id="updateName" placeholder="New Name"><br><br>

<input type="number" id="updateAge" placeholder="New Age"><br><br>

<button onclick="updateUser()">Update</button>

<h3>All Users</h3>
<button onclick="getUsers()">Load Users</button>

<pre id="allUsers"></pre>

<script>
  const form = document.getElementById("catForm");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;

    try {
      const res = await fetch("https://es6-reviewca.onrender.com/users", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, age })
      });

      const data = await res.json();

      document.getElementById("responseMsg").textContent =
        "✅ User created successfully!";

      document.getElementById("response").textContent =
        JSON.stringify(data, null, 2);

      form.reset();

    } catch (err) {
      console.error(err);  // <-- helpful for debugging
      document.getElementById("responseMsg").textContent =
        "❌ Error connecting to server";
    }
  });

  async function deleteUser() {
  const id = document.getElementById("deleteId").value;

  if (!id) {
    document.getElementById("responseMsg").textContent =
      "⚠️ Please enter a user ID";
    return;
  }

  try {
    const res = await fetch(`https://es6-reviewca.onrender.com/users/${id}`, {
      method: "DELETE"
    });

    const data = await res.json();

    document.getElementById("responseMsg").textContent =
      "🗑️ User deleted successfully!";

    document.getElementById("response").textContent =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("responseMsg").textContent =
      "❌ Error deleting user";
  }
}

async function updateUser() {
  const id = document.getElementById("updateId").value;
  const name = document.getElementById("updateName").value;
  const age = document.getElementById("updateAge").value;

  if (!id) {
    document.getElementById("responseMsg").textContent =
      "⚠️ Please enter user ID";
    return;
  }

  try {
    const res = await fetch(`https://es6-reviewca.onrender.com/users/${id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, age })
    });

    const data = await res.json();

    document.getElementById("responseMsg").textContent =
      "✏️ User updated successfully!";

    document.getElementById("response").textContent =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("responseMsg").textContent =
      "❌ Error updating user";
  }
}

async function getUsers() {
  const res = await fetch("https://es6-reviewca.onrender.com/users");
  const data = await res.json();

  document.getElementById("allUsers").textContent =
    JSON.stringify(data, null, 2);
}

</script>

</body>
</html>
